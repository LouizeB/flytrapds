<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=apps/docs/dist/index.html" />
    <title>Flytrap Design System · Live Preview</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #05060a;
        color: #fff;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 72% 24%, rgba(241, 0, 129, .22), transparent 28rem),
          radial-gradient(circle at 16% 72%, rgba(184, 255, 53, .14), transparent 24rem),
          #05060a;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid rgba(255, 255, 255, .12);
        border-radius: 1.5rem;
        padding: 2rem;
        background: rgba(10, 12, 20, .78);
        box-shadow: 0 30px 100px rgba(0, 0, 0, .45);
        backdrop-filter: blur(18px);
      }

      p {
        margin: .75rem 0 0;
        color: rgba(255, 255, 255, .68);
        line-height: 1.6;
      }

      a {
        color: #b8ff35;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Flytrap Design System</h1>
      <p>Redirecionando para a prévia local do DS…</p>
      <p>Se não abrir automaticamente, acesse <a href="apps/docs/dist/index.html">apps/docs/dist/index.html</a>.</p>
    </main>
  </body>
</html>
