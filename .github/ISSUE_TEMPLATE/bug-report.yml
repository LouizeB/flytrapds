name: Bug report
description: Reporte um problema reproduzível em componente, token, documentação ou infraestrutura.
title: "[bug]: "
labels: [bug, triage]
body:
  - type: dropdown
    id: area
    attributes:
      label: Área
      options:
        - Tokens
        - Componentes
        - AI layer
        - Documentação
        - Dashboard
        - CI/CD
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: O que aconteceu?
      description: Descreva o comportamento observado e o esperado.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Como reproduzir
      placeholder: |
        1. Renderize...
        2. Ative o modo...
        3. Observe...
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Aparência
      multiple: true
      options:
        - Light
        - Dark
        - Vibrant
        - Não se aplica
  - type: textarea
    id: context
    attributes:
      label: Evidências
      description: Inclua captura, vídeo, logs ou link para reprodução sem expor secrets.
  - type: checkboxes
    id: checks
    attributes:
      label: Verificações
      options:
        - label: Confirmei que não há secrets, chaves ou dados pessoais nas evidências.
          required: true
