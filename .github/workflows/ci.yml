name: CI
on:
  pull_request: {}
  push: { branches: [main] }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pnpm install --frozen-lockfile
      - name: Build tokens
        run: pnpm -F @flytrap/tokens build
      - name: APCA gate
        run: python3 scripts/apca_gate.py packages/tokens/src/flytrap.tokens.json
      - name: Build UI
        run: pnpm -F @flytrap/ui build
      - name: Build apps
        run: pnpm build
      - run: pnpm lint
      - run: pnpm typecheck
